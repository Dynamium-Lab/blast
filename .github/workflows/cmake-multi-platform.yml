name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # -------------------------------------------------------------------------
  # Build + test (developer tree)
  # -------------------------------------------------------------------------
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: >
          cmake -B ${{ github.workspace }}/build
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -S ${{ github.workspace }}

      - name: Build
        run: cmake --build ${{ github.workspace }}/build --config ${{ matrix.build_type }}

      - name: Test
        working-directory: ${{ github.workspace }}/build
        run: ctest --build-config ${{ matrix.build_type }} --output-on-failure

  # -------------------------------------------------------------------------
  # Install + consumer smoke test
  # Verifies that find_package(Blast) works from an installed tree. The tiny
  # consumer project is generated inline below (not checked into the repo) to
  # keep the source tree clean. Only runs on Linux to keep CI fast; the logic
  # is platform-agnostic.
  # -------------------------------------------------------------------------
  install-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Blast
        run: >
          cmake -B ${{ github.workspace }}/build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install
          -S ${{ github.workspace }}

      - name: Build Blast
        run: cmake --build ${{ github.workspace }}/build --config Release

      - name: Install Blast
        run: cmake --install ${{ github.workspace }}/build --config Release

      - name: Generate consumer smoke test
        run: |
          mkdir -p "$RUNNER_TEMP/consumer"
          cat > "$RUNNER_TEMP/consumer/CMakeLists.txt" <<'EOF'
          cmake_minimum_required(VERSION 3.21)
          project(blast_consumer CXX)

          find_package(Blast REQUIRED)

          add_executable(test_consumer main.cpp)
          target_link_libraries(test_consumer PRIVATE Blast::blast)
          EOF
          cat > "$RUNNER_TEMP/consumer/main.cpp" <<'EOF'
          // Minimal consumer — verifies that the installed Blast headers and the
          // exported nlopt target are all reachable via find_package(Blast).
          #include <blast>
          #include <iostream>

          int main() {
            // Exercise a type from blast_math.hpp (included transitively via <blast>)
            blast::Vec3 v{1.0, 2.0, 3.0};
            std::cout << "Blast::Vec3 constructed: "
                      << v.x << " " << v.y << " " << v.z << "\n";
            return 0;
          }
          EOF

      - name: Configure consumer
        run: >
          cmake -B "$RUNNER_TEMP/consumer/build"
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_PREFIX_PATH=${{ github.workspace }}/install
          -S "$RUNNER_TEMP/consumer"

      - name: Build consumer
        run: cmake --build "$RUNNER_TEMP/consumer/build" --config Release

      - name: Run consumer
        run: "$RUNNER_TEMP/consumer/build/test_consumer"